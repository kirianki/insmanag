services:
  db:
    image: postgres:16-alpine
    container_name: insmanag_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    expose:
      - "5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: insmanag_redis
    expose:
      - "6379"
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insmanag_api
    command: gunicorn insurance_agency_project.wsgi:application --bind 0.0.0.0:8001
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8001"
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=insurance_agency_project.settings
      - DEBUG=True
    depends_on:
      - db
      - redis
    restart: always

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insmanag_celery_worker
    command: celery -A insurance_agency_project worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=insurance_agency_project.settings
    depends_on:
      - api
      - redis
    restart: always

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: insmanag_celery_beat
    command: celery -A insurance_agency_project beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DJANGO_SETTINGS_MODULE=insurance_agency_project.settings
    depends_on:
      - api
      - redis
    restart: always

  frontend:
    build:
      context: ./insurance-agency-frontend
    container_name: insmanag_frontend
    expose:
      - "3001"
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api/v1
    restart: always
    read_only: true
    pids_limit: 200
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  static_volume:
  media_volume:
